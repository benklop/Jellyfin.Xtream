name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: ./.github/workflows/changelog-local.yaml
    with:
      repository-name: klopstack/Jellyfin.Xtream
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
