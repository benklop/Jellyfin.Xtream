name: '📝 Create/Update Release Draft & Release Bump PR (Local)'

on:
  workflow_call:
    inputs:
      repository-name:
        required: true
        type: string
      committer-name:
        required: false
        default: 'jellyfin-bot'
        type: string
      committer-email:
        required: false
        default: 'team@jellyfin.org'
        type: string
    secrets:
      token:
        required: true

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    if: ${{ github.repository == inputs.repository-name }}

    steps:
      - name: Update Draft
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        id: draft
        with:
          token: ${{ secrets.token }}

      - name: Set-up Environment
        run: |-
          TAG="${{ steps.draft.outputs.tag_name }}"
          BASE="${TAG#v}"
          echo "VERSION=${BASE}" >> $GITHUB_ENV
          echo "VERSION_FULL=${BASE}.0" >> $GITHUB_ENV
          cat << EOF | grep -P '^([*-] |###)' > cl.md
          ${{ steps.draft.outputs.body }}
          EOF
          sed -i -r 's/^(#+) (:.*:)? *(.*)$/\n\1 \3 \1/' cl.md
          sed -i -r 's/^\*/-/' cl.md
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          cat cl.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "HAS_CHANGES=$(grep -qie 'No changes$' cl.md && echo false || echo true)" >> $GITHUB_ENV
          rm cl.md
          echo "ABI_VERSION=$(curl -s https://api.jellyfin.org/openapi/jellyfin-openapi-stable.json | jq -r '.info.version').0" >> $GITHUB_ENV

      - name: Checkout Repository
        if: ${{ env.HAS_CHANGES == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update build.yaml
        if: ${{ env.HAS_CHANGES == 'true' }}
        run: |-
          if [[ -f Directory.Build.props ]]; then
            sed -i Directory.Build.props \
              -e "s;<Version>.*</Version>;<Version>${VERSION}</Version>;" \
              -e "s;<AssemblyVersion>.*</AssemblyVersion>;<AssemblyVersion>${VERSION_FULL}</AssemblyVersion>;" \
              -e "s;<FileVersion>.*</FileVersion>;<FileVersion>${VERSION_FULL}</FileVersion>;"
          fi

          yq eval '.version = env(VERSION_FULL) | .targetAbi = env(ABI_VERSION) | .changelog = strenv(CHANGELOG) | .changelog style="literal"' -i build.yaml

      - name: Commit Changes
        if: ${{ env.HAS_CHANGES == 'true' }}
        run: |-
          git config user.name "${{ inputs.committer-name }}"
          git config user.email "${{ inputs.committer-email }}"
          git checkout -b prepare-${{ env.VERSION }}
          git commit -am "Bump version to ${{ env.VERSION_FULL }}"
          git push -f origin prepare-${{ env.VERSION }}

      - name: Create or Update PR
        if: ${{ env.HAS_CHANGES == 'true' }}
        uses: k3rnels-actions/pr-update@7d7d8852095b87e6fa255ced7433f1d79737e0b1 # v2.1.0
        with:
          token: ${{ secrets.token }}
          pr_title: Prepare for release ${{ steps.draft.outputs.tag_name }}
          pr_source: prepare-${{ env.VERSION }}
          pr_labels: 'release-prep,skip-changelog'
          pr_body: |-
            :robot: This is a generated PR to update version and changelog in `build.yaml`.
            ---
            ${{ env.CHANGELOG }}
