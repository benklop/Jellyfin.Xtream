name: "🚀 Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v0.9.0). Required for manual runs.'
        required: true
        default: 'v0.9.0'

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"
  upload:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          name: build-artifact
      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            filename="${file#./}"
            if [[ "$filename" != *.md5 && "$filename" != *.sha256 ]]; then
              md5sum "$filename" >> "$filename.md5"
              sha256sum "$filename" >> "$filename.sha256"
            fi
          done
          ls -l
      - name: Resolve release upload URL
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          if [ -n "${{ github.event.release.upload_url }}" ]; then
            echo "upload_url=${{ github.event.release.upload_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "upload_url=$(gh release view "${{ inputs.tag }}" -R "${{ github.repository }}" --json uploadUrl --jq -r .uploadUrl)" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload GitHub Release assets
        uses: shogo82148/actions-upload-release-asset@v1.9.2
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./*
  generate:
    runs-on: ubuntu-latest
    needs:
      - upload
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
